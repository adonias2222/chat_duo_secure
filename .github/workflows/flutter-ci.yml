name: Flutter Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project and permissions
        run: bash scripts/prepare_android.sh

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze without blocking APK build
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build optimized release APKs by architecture
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=TURN_URL="${{ secrets.TURN_URL }}" \
            --dart-define=TURN_USERNAME="${{ secrets.TURN_USERNAME }}" \
            --dart-define=TURN_PASSWORD="${{ secrets.TURN_PASSWORD }}"

      - name: Upload optimized APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chat-duo-secure-release-apks
          path: build/app/outputs/flutter-apk/*.apk
